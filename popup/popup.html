<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Docsense AI</title>

    <style>
        body {

            width: 300px;

            padding: 18px;

            font-family: sans-serif;

            background: #111827;

            color: white;

        }

        h2 {

            margin-top: 0;

            font-size: 20px;

            margin-bottom: 8px;

        }

        .subtitle {

            opacity: 0.8;

            font-size: 13px;

            line-height: 1.5;

            margin-bottom: 14px;

        }

        input {

            width: 100%;

            padding: 10px;

            border-radius: 8px;

            border: none;

            outline: none;

            background: #1f2937;

            color: white;

            box-sizing: border-box;

        }

        button {

            width: 100%;

            margin-top: 12px;

            padding: 10px;

            border: none;

            border-radius: 8px;

            background: #8b5cf6;

            color: white;

            font-weight: bold;

            cursor: pointer;

        }

        .secondary-button {

            background: #27272a;

        }

        .status {

            margin-top: 12px;

            opacity: 0.8;

            font-size: 14px;

        }
    </style>

</head>

<body>

    <h2>Docsense AI</h2>

    <div class="subtitle">

        Docsense currently uses Google's Gemini API.
        Generate a free API key and paste it below.

    </div>

    <input type="password" id="apiKeyInput" placeholder="Enter Gemini API Key" />

    <button id="getApiKeyButton" class="secondary-button">

        Get Gemini API Key

    </button>

    <button id="saveButton">

        Save Gemini API Key

    </button>

    <button id="activateButton">

        Activate Docsense

    </button>

    <div class="status" id="statusText"></div>

    <script src="popup.js"></script>

</body>

</html>
